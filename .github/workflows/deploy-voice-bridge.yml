name: Deploy Voice Bridge

on:
  push:
    branches: [main]
    paths:
      - 'voice-bridge/**'
      - '.github/workflows/deploy-voice-bridge.yml'
  workflow_dispatch:

concurrency:
  group: deploy-voice-bridge
  cancel-in-progress: false   # never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy to sandra-vm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout (for image tag only — we deploy via SSH pull) ──────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. SSH deploy ──────────────────────────────────────────────────────
      - name: Set up SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/deploy_key
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Debug key fingerprint
        run: ssh-keygen -lf ~/.ssh/deploy_key || echo "invalid key"

      - name: Pull & rebuild on VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_DEPLOY_DIR: ${{ secrets.VM_DEPLOY_DIR }}   # e.g. /opt/sandra/repo
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "$VM_USER@$VM_HOST" bash -s << 'ENDSSH'

          set -euo pipefail

          REPO_DIR="${VM_DEPLOY_DIR:-/opt/sandra/repo}"
          BRIDGE_DIR="$REPO_DIR/voice-bridge"

          echo "=== [$(date -u)] Starting deploy ==="

          # Ensure git trusts the deploy directory
          sudo git config --global --add safe.directory "$REPO_DIR" 2>/dev/null || true

          # Pull latest code
          echo "--- git pull"
          sudo git -C "$REPO_DIR" fetch --prune
          sudo git -C "$REPO_DIR" checkout main 2>/dev/null || true
          sudo git -C "$REPO_DIR" pull --ff-only origin main

          # Rebuild image and recreate container (zero-downtime: build first, then swap)
          echo "--- docker compose build"
          sudo docker compose -f "$BRIDGE_DIR/docker-compose.yml" build voice-bridge

          echo "--- docker compose up"
          sudo docker compose -f "$BRIDGE_DIR/docker-compose.yml" up -d --no-build --remove-orphans voice-bridge caddy

          # Prune old images to keep disk clean
          sudo docker image prune -f --filter "until=24h" >/dev/null 2>&1 || true

          # Health check
          echo "--- health check"
          for i in $(seq 1 12); do
            STATUS=$(sudo docker inspect --format='{{.State.Health.Status}}' sandra-voice-bridge 2>/dev/null || echo "missing")
            echo "  attempt $i/12 — $STATUS"
            [[ "$STATUS" == "healthy" ]] && echo "=== Deploy successful ===" && exit 0
            sleep 5
          done

          echo "ERROR: voice-bridge did not become healthy within 60s"
          sudo docker logs sandra-voice-bridge --tail 50
          exit 1

          ENDSSH

      # ── 3. Notify on failure ───────────────────────────────────────────────
      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Voice bridge deploy to ${{ secrets.VM_HOST }} FAILED. Check logs above."
